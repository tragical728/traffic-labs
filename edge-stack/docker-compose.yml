version: '3'

services:

  landing1:
    build: ./landing
  landing2:
    build: ./landing
  landing3:
    build: ./landing


  safe-landing:
    build: ./safe-landing

  tracker:
    build: ./tracker
    volumes:
      - ./logs/tracker:/var/log/nginx


  loadbalancer:
    image: nginx:alpine
    volumes:
      - ./lb-nginx.conf:/etc/nginx/nginx.conf
      - ./logs/lb:/var/log/nginx

  router:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./router-nginx.conf:/etc/nginx/nginx.conf
      - ./logs/router:/var/log/nginx
